name: Lint and Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
       node-version: '22'  # Use Node.js 22 (or '20.19.0' for the minimum supported version)

    - name: Install dependencies
      run: npm install

    - name: Run lint and build
      run: npm run check
